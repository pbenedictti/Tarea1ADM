name: CI/CD Pipeline
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install specific Bundler version
        run: gem install bundler:4.0.6

      - name: Instalar Dependencias
        run: bundle install

      - name: Create credentials file
        run: echo '${{ secrets.FIREBASE_KEY_JSON }}' > firebase-key.json

      - name: Deploy to Firebase
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: bundle exec fastlane distribute